version: '3.8'

services:
  backend:
    build:
      context: ./aegis-sre
      dockerfile: Dockerfile
    container_name: aegis-backend
    ports:
      - "8000:8000"
    volumes:
      - aegis-data:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - E2B_API_KEY=${E2B_API_KEY}
      - VCS_PROVIDER=${VCS_PROVIDER:-github}
      - VCS_REPO_URL=${VCS_REPO_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./aegis-dashboard
      dockerfile: Dockerfile
    container_name: aegis-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aegis-data:
    description: Persistent volume for the SQLite database state

name: aegis-ci

# Stone 0 (A5): CI gate. Runs the unit/integration suite and the eval-corpus
# schema validation on every push/PR. The live-model fix-rate eval is a separate,
# manually-triggered job (it needs Ollama + GPU, not available on hosted runners).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegis-sre
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-cloud.txt
          pip install coverage

      - name: Validate eval corpus (schema gate)
        run: python -c "from run_evals import load_corpus; print('corpus cases:', len(load_corpus('eval/corpus.json')))"

      - name: Run test suite with coverage
        run: |
          coverage run -m pytest -q
          coverage report --include="aegis_sre/*,run_evals.py" | grep -v "tests/"

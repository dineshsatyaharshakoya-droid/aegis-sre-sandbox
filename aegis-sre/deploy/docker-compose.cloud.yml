# Cloud / scaled profile (local facsimile of the production topology).
# Postgres (system of record) + Redis (atomic dedup cache + Streams broker).
# API and workers are SEPARATE, independently scalable services.
# In real production these become managed Postgres/Redis + a K8s Deployment with
# an HPA on the worker (queue depth) and on the API (CPU/RPS).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ..
    command: uvicorn aegis_sre.telemetry.api_receiver:app --host 0.0.0.0 --port 8000
    environment: &cloud_env
      AEGIS_PROFILE: cloud
      AEGIS_DATABASE_URL: postgres://aegis:aegis@postgres:5432/aegis
      AEGIS_REDIS_URL: redis://redis:6379/0
      HERMES_MODEL: ollama/llama3
      NEMOTRON_MODEL: ollama/llama3
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ..
    command: python worker.py
    environment:
      <<: *cloud_env
      AEGIS_WORKER_CONCURRENCY: "2"
    deploy:
      replicas: 3            # scale this number (or k8s HPA) for throughput
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
